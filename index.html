<style>
/* ── Modernist design-system tokens ─────────────────────────────────────── */
:root{
  --color-bg:#f3f2f2;
  --color-surface:#eae9e9;
  --color-text:#201e1d;
  --color-accent:#ec3013;
  --color-divider:color-mix(in srgb,#201e1d 40%,transparent);
  --font-heading:"Archivo",system-ui,sans-serif;
  --font-body:"Archivo",system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
body{
  margin:0;background:#cbc8c4;color:var(--color-text);
  font-family:var(--font-body);font-size:15px;line-height:1.55;
  display:flex;align-items:center;justify-content:center;min-height:100vh;
}
h1,h2{font-family:var(--font-heading);font-weight:800;line-height:1.12;letter-spacing:-0.015em;margin:0}
button{font-family:inherit}
:focus{outline:none}
:focus-visible{outline:2px solid var(--color-accent);outline-offset:2px}

/* ── iPhone frame ───────────────────────────────────────────────────────── */
.phone{
  position:relative;width:402px;height:874px;flex:none;
  background:#0b0b0b;border-radius:56px;padding:11px;
  box-shadow:0 30px 70px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.06) inset;
}
.screen{
  position:relative;width:100%;height:100%;overflow:hidden;
  border-radius:45px;background:var(--color-bg);
  display:flex;flex-direction:column;
}
.island{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  width:118px;height:34px;border-radius:19px;background:#0b0b0b;z-index:50;pointer-events:none;
}
.statusbar{
  position:absolute;top:0;left:0;right:0;height:56px;z-index:49;pointer-events:none;
  display:flex;align-items:center;justify-content:space-between;padding:18px 30px 0;

}
.statusbar.on-white{color:#000}
@media (max-width:460px){

}
.btn-wide{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;font-size:15px;letter-spacing:.04em}

.label{

/* ── Image slot ─────────────────────────────────────────────────────────── */

}

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════════════
   Seed data
   ═══════════════════════════════════════════════════════════════════════ */
const SEED_RECIPES = [

    {n:'Shrimp',          q:200, u:'g',     g:'Protein'},
    {n:'Pork loin',       q:150, u:'g',     g:'Protein'},
    {n:'Rice paper',      q:12,  u:'sheets',g:'Pantry'},
    {n:'Rice vermicelli', q:100, u:'g',     g:'Pantry'},
    {n:'Mint',            q:1,   u:'bunch', g:'Herbs & Aromatics'},
    {n:'Lettuce',         q:1,   u:'head',  g:'Produce'},
  ]},
  { id:'comtam', name:'Cơm Tấm', en:'Broken rice & pork chop', cat:'Rice', time:40, ing:[
    {n:'Pork chop',   q:2,   u:'',    g:'Protein'},
    {n:'Broken rice', q:300, u:'g',   g:'Pantry'},
    {n:'Fish sauce',  q:2,   u:'tbsp',g:'Pantry'},
    {n:'Cucumber',    q:1,   u:'',    g:'Produce'},
    {n:'Tomato',      q:2,   u:'',    g:'Produce'},
  ]},
  { id:'cari', name:'Cà Ri Gà', en:'Chicken coconut curry', cat:'Curry', time:55, ing:[
    {n:'Chicken thighs',q:600, u:'g',      g:'Protein'},
    {n:'Coconut milk',  q:400, u:'ml',     g:'Pantry'},
    {n:'Potato',        q:3,   u:'',       g:'Produce'},
    {n:'Carrot',        q:2,   u:'',       g:'Produce'},
    {n:'Curry powder',  q:2,   u:'tbsp',   g:'Pantry'},
    {n:'Lemongrass',    q:2,   u:'stalks', g:'Herbs & Aromatics'},
  ]},
  { id:'banhxeo', name:'Bánh Xèo', en:'Sizzling crêpe', cat:'Grill', time:40, ing:[
    {n:'Shrimp',       q:200, u:'g',  g:'Protein'},
    {n:'Pork belly',   q:150, u:'g',  g:'Protein'},
    {n:'Rice flour',   q:200, u:'g',  g:'Pantry'},
    {n:'Coconut milk', q:200, u:'ml', g:'Pantry'},
    {n:'Bean sprouts', q:200, u:'g',  g:'Produce'},
    {n:'Turmeric',     q:1,   u:'tsp',g:'Pantry'},
  ]},
];

const CATS = ['Soup','Grill','Fresh','Rice','Curry','Sweet'];
const GROUP_ORDER = ['Protein','Produce','Herbs & Aromatics','Pantry'];
const STORE_KEY = 'nius-kitchen/v1';

/* ═══════════════════════════════════════════════════════════════════════════
   State
   ═══════════════════════════════════════════════════════════════════════ */
const state = {
  screen: 'menu',
  cart: {},        // recipe id -> batch count
  checked: {},     // ingredient key -> true
  detail: null,    // recipe id
  share: false,
  shareSent: false,
  pairOpen: false,
  toast: null,
  recipes: SEED_RECIPES,
  photos: {},      // slot id -> data URL
  editing: null,   // recipe id being edited, or null when adding a new dish
  confirmDelete: false,
  form: { name:'', en:'', cat:'Soup', time:'', ingredients:[{name:'',qty:'',unit:''}] },
};

const blankForm = () => ({ name:'', en:'', cat:'Soup', time:'', ingredients:[{ name:'', qty:'', unit:'' }] });
function resetForm(){
  state.form = blankForm();
  state.editing = null;
  state.confirmDelete = false;
}

/* Recipes, cart and check-offs live in localStorage — small and synchronous.
   Photos live in IndexedDB: base64 images blow localStorage's ~5MB cap after
   a dozen or so dishes, and it fails silently when it does. */
function saveLocal(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify({
      v:2, cart:state.cart, checked:state.checked, recipes:state.recipes,
      // Persisted so "what has the server already seen" survives a reload.
      // Without it every field looks locally-edited on boot, and this device
      // would push its stale state over the other person's changes.
      synced: lastSynced,
    }));
  }catch(e){ showToast('Could not save — storage full'); }
}

// Write to the device first, then push to the cloud in the background.
function save(){
  saveLocal();
  scheduleFlush();
}

const DB_NAME = 'nius-kitchen', PHOTO_STORE = 'photos';
let _dbp;
function db(){
  if(!_dbp) _dbp = new Promise((res, rej) => {
    const rq = indexedDB.open(DB_NAME, 1);
    rq.onupgradeneeded = () => rq.result.createObjectStore(PHOTO_STORE);
    rq.onsuccess = () => res(rq.result);
    rq.onerror   = () => rej(rq.error);
  });
  return _dbp;
}
function photoTx(mode, fn){
  return db().then(d => new Promise((res, rej) => {
    const t = d.transaction(PHOTO_STORE, mode);
    fn(t.objectStore(PHOTO_STORE));
    t.oncomplete = () => res();
    t.onerror    = () => rej(t.error);
  }));
}
const photoPut = (k, v) => photoTx('readwrite', s => s.put(v, k));
const photoDel = k      => photoTx('readwrite', s => s.delete(k));
function photoAll(){
  return db().then(d => new Promise((res, rej) => {
    const out = {};
    const c = d.transaction(PHOTO_STORE, 'readonly').objectStore(PHOTO_STORE).openCursor();
    c.onsuccess = e => {
      const cur = e.target.result;
      if(cur){ out[cur.key] = cur.value; cur.continue(); } else res(out);
    };
    c.onerror = () => rej(c.error);
  }));
}

function setPhoto(id, dataUrl){
  state.photos[id] = dataUrl;
  photoPut(id, dataUrl).catch(() => showToast('Could not save that photo'));
  pushPhoto(id, dataUrl);
}
function dropPhoto(id){
  delete state.photos[id];
  photoDel(id).catch(() => {});
  dropPhotoRemote(id);
}

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    if(d.cart)    state.cart    = d.cart;
    if(d.checked) state.checked = d.checked;
    if(Array.isArray(d.recipes) && d.recipes.length) state.recipes = d.recipes;
    if(d.synced)  Object.assign(lastSynced, d.synced);
    // v1 stored photos in localStorage — move them to IndexedDB, then reclaim.
    if(d.photos && Object.keys(d.photos).length){
      state.photos = d.photos;
      Promise.all(Object.entries(d.photos).map(([k, v]) => photoPut(k, v)))
        .then(save).catch(() => {});
    }
  }catch(e){ /* corrupt store — fall back to seed data */ }
}

/* ═══════════════════════════════════════════════════════════════════════
   Cloud sync — local-first
   Every change is written to this device first and rendered immediately, so
   the app is fully usable with no signal. Syncing happens in the background
   and catches up when the connection returns. With no credentials in
   config.js the app simply stays on-device.
   ═══════════════════════════════════════════════════════════════════════ */
const CLOUD = window.NIUS_CONFIG || {};
const cloudConfigured = !!(CLOUD.url && CLOUD.anonKey);
const HOUSE_KEY = 'nius-kitchen/household';

let sb = null;             // supabase client
let household = null;      // household id — the thing that pairs two phones
let syncState = cloudConfigured ? 'connecting' : 'local';

// Snapshot of what the server last agreed with, used to work out which
// fields this device has changed. Avoids pushing (and clobbering) fields
// the other person edited.
const lastSynced = { recipes:null, cart:null, checked:null };
const SYNC_FIELDS = ['recipes', 'cart', 'checked'];

function setSync(s){
  if(syncState === s) return;
  syncState = s;
  if(state.screen === 'menu') render();
}

function newHouseholdId(){
  const a = new Uint8Array(9);
  crypto.getRandomValues(a);
  return btoa(String.fromCharCode(...a)).replace(/[^a-zA-Z0-9]/g, '').slice(0, 12);
}

/** A link with #k=<id> joins that household — this is how the second phone pairs. */
function resolveHousehold(){
  const fromLink = new URLSearchParams(location.hash.slice(1)).get('k');
  const stored = localStorage.getItem(HOUSE_KEY);
  if(fromLink && fromLink !== stored){
    localStorage.setItem(HOUSE_KEY, fromLink);
    // Joining someone else's kitchen: their data wins, so don't push ours over it.
    SYNC_FIELDS.forEach(f => { lastSynced[f] = JSON.stringify(state[f]); });
    return fromLink;
  }
  const id = stored || newHouseholdId();
  localStorage.setItem(HOUSE_KEY, id);
  return id;
}

function dirtyFields(){
  return SYNC_FIELDS.filter(f => JSON.stringify(state[f]) !== lastSynced[f]);
}

/* An unreachable host hangs rather than failing, which would leave the status
   on "Syncing…" indefinitely. Give every request a deadline. */
function withTimeout(p, ms = 8000){
  return Promise.race([
    p,
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms)),
  ]);
}

let flushTimer;
function scheduleFlush(){
  if(!sb) return;
  clearTimeout(flushTimer);
  flushTimer = setTimeout(flush, 500);
}

async function flush(){
  if(!sb) return;
  if(!navigator.onLine){ setSync('offline'); return; }

  const fields = dirtyFields();
  if(!fields.length){ setSync('synced'); return; }

  setSync('syncing');
  const patch = { id: household, updated_at: new Date().toISOString() };
  const snapshot = {};
  fields.forEach(f => {
    patch[f] = state[f];
    snapshot[f] = JSON.stringify(state[f]);
  });

  let error;
  try{ ({ error } = await withTimeout(sb.from('kitchens').upsert(patch))); }
  catch(e){ error = e; }
  if(error){
    // Leave lastSynced alone so these fields stay dirty and retry later.
    setSync(navigator.onLine ? 'error' : 'offline');
    return;
  }
  Object.assign(lastSynced, snapshot);
  saveLocal();                       // keep the snapshot across reloads
  setSync(dirtyFields().length ? 'syncing' : 'synced');
  if(dirtyFields().length) scheduleFlush();
}

/** Adopt server values for any field this device hasn't touched. */
function applyRemote(row){
  if(!row) return;
  const mine = dirtyFields();
  let changed = false;
  SYNC_FIELDS.forEach(f => {
    if(mine.includes(f)) return;            // local edit pending — keep ours
    if(row[f] == null) return;
    const incoming = JSON.stringify(row[f]);
    if(incoming === lastSynced[f]) return;  // nothing new
    state[f] = row[f];
    lastSynced[f] = incoming;
    changed = true;
  });
  if(changed){
    saveLocal();
    render();
  }
}

async function pull(){
  let data, error;
  try{ ({ data, error } = await withTimeout(sb.from('kitchens').select('*').eq('id', household).maybeSingle())); }
  catch(e){ setSync('error'); return; }
  if(error){ setSync('error'); return; }

  if(!data){
    // First run for this household — seed the server from this device.
    SYNC_FIELDS.forEach(f => { lastSynced[f] = null; });
    await flush();
    return;
  }
  applyRemote(data);
  SYNC_FIELDS.forEach(f => {
    if(data[f] != null && !dirtyFields().includes(f)) lastSynced[f] = JSON.stringify(state[f]);
  });
  await flush();
}

/* Photos sync separately: only the ones this device is missing get pulled,
   so opening the app doesn't re-download every image over mobile data. */
async function pushPhoto(slot, data){
  if(!sb || !navigator.onLine) return;
  try{
    await sb.from('photos').upsert({ household, slot, data, updated_at:new Date().toISOString() });
  }catch(e){ /* retried on next syncPhotos */ }
}
async function dropPhotoRemote(slot){
  if(!sb || !navigator.onLine) return;
  try{ await sb.from('photos').delete().eq('household', household).eq('slot', slot); }catch(e){}
}
async function syncPhotos(){
  if(!sb || !navigator.onLine) return;
  let rows, error;
  try{ ({ data: rows, error } = await withTimeout(sb.from('photos').select('slot').eq('household', household))); }
  catch(e){ return; }
  if(error || !rows) return;

  const missing = rows.map(r => r.slot).filter(s => !state.photos[s]);
  if(missing.length){
    const { data: full } = await sb.from('photos')
      .select('slot,data').eq('household', household).in('slot', missing);
    (full || []).forEach(r => {
      if(!r.data) return;
      state.photos[r.slot] = r.data;
      photoPut(r.slot, r.data).catch(() => {});
    });
    render();
  }

  const remote = new Set(rows.map(r => r.slot));
  Object.keys(state.photos).forEach(slot => {
    if(!remote.has(slot)) pushPhoto(slot, state.photos[slot]);
  });
}

let realtimeOk = false;

function subscribe(){
  sb.channel('kitchen-' + household)
    .on('postgres_changes',
        { event:'*', schema:'public', table:'kitchens', filter:'id=eq.' + household },
        payload => { realtimeOk = true; applyRemote(payload.new); })
    .on('postgres_changes',
        { event:'*', schema:'public', table:'photos', filter:'household=eq.' + household },
        () => { realtimeOk = true; syncPhotos(); })
    .subscribe(status => { realtimeOk = status === 'SUBSCRIBED'; });
}

/* Realtime is the fast path, not the only one. If the tables aren't in the
   supabase_realtime publication the channel still joins happily and simply
   never delivers anything — so also poll while the app is on screen. Costs
   one small row read; keeps sync working either way. */
function startPolling(){
  const refresh = () => {
    if(!sb || !navigator.onLine) return;
    if(document.visibilityState !== 'visible') return;
    pull();
  };
  setInterval(refresh, 20000);
  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'visible'){ refresh(); syncPhotos(); }
  });
}

async function initCloud(){
  if(!cloudConfigured) return;
  household = resolveHousehold();
  try{
    const mod = await import('https://esm.sh/@supabase/supabase-js@2');
    sb = mod.createClient(CLOUD.url, CLOUD.anonKey, { auth:{ persistSession:false } });
  }catch(e){
    setSync('error');
    return;
  }
  window.addEventListener('online',  () => { setSync('syncing'); flush(); syncPhotos(); });
  window.addEventListener('offline', () => setSync('offline'));

  if(!navigator.onLine){ setSync('offline'); return; }
  setSync('syncing');
  await pull();
  await syncPhotos();
  subscribe();
  startPolling();
}

/* ── Backup / restore ───────────────────────────────────────────────────
   The only way to move a menu between phones, and the only real safety net:
   browser storage is per-device and vanishes with the app. */
function exportBackup(){
  const payload = {
    app:'nius-kitchen', version:2, exported:new Date().toISOString(),
    recipes:state.recipes, cart:state.cart, checked:state.checked, photos:state.photos,
  };
  const url = URL.createObjectURL(new Blob([JSON.stringify(payload)], { type:'application/json' }));
  const a = document.createElement('a');
  a.href = url;
  a.download = 'nius-kitchen-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
  showToast('Backup saved');
}

function importBackup(file){
  const reader = new FileReader();
  reader.onload = () => {
    let d;
    try{ d = JSON.parse(reader.result); }
    catch(e){ showToast('That file is not a backup'); return; }
    if(!d || !Array.isArray(d.recipes) || !d.recipes.length){
      showToast('That file is not a backup'); return;
    }
    if(!confirm('Replace the current menu, order and photos with this backup?')) return;

    state.recipes = d.recipes;
    state.cart    = d.cart    || {};
    state.checked = d.checked || {};
    state.photos  = d.photos  || {};
    Promise.all(Object.entries(state.photos).map(([k, v]) => photoPut(k, v))).catch(() => {});

    resetForm();
    state.screen = 'menu';
    state.detail = null;
    save();
    showToast('Backup restored');
  };
  reader.readAsText(file);
}

const esc = s => String(s ?? '').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const fmt = n => String(Math.round(n*100)/100);
const qtyStr = (q,u) => (!q && q!==0) ? (u||'') : (u ? `${fmt(q)} ${u}` : fmt(q));

const recipeById = id => state.recipes.find(r => r.id === id);

let toastTimer;
function showToast(msg){
  state.toast = msg;
  render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { state.toast = null; render(); }, 2100);
}

function setCart(id, val){
  if(val <= 0) delete state.cart[id];
  else state.cart[id] = val;

/** Aggregate every ordered recipe's ingredients into one grouped shopping list. */
function buildGroups(){
  const agg = {};
  Object.keys(state.cart).forEach(id => {
    const r = recipeById(id);
    if(!r) return;
    const batches = state.cart[id];
    r.ing.forEach(i => {
      const key = (i.n + '|' + i.u).toLowerCase();
      if(!agg[key]) agg[key] = { name:i.n, unit:i.u, qty:0, group:i.g || 'Pantry' };
      agg[key].qty += (i.q || 0) * batches;
    });
  });

  const byGroup = {};
  Object.keys(agg).forEach(key => {
    const it = agg[key];
    (byGroup[it.group] = byGroup[it.group] || []).push({ ...it, key });
  });

  const groups = [];
  GROUP_ORDER.forEach(g => {
    if(!byGroup[g]) return;
    byGroup[g].sort((a,b) => a.name.localeCompare(b.name));
    groups.push({
      group: g,
      items: byGroup[g].map(it => ({
        key: it.key,
        name: it.name,
        qty: qtyStr(it.qty, it.unit),
        done: !!state.checked[it.key],
      })),
    });
  });
  return { groups, count: Object.keys(agg).length };
}

/** Guess a shopping-list aisle for a hand-entered ingredient.
 *  Aromatics are tested before produce on purpose: "lemongrass" would
 *  otherwise match `lemon` and land in Produce, while the seed recipes file it
 *  under Herbs & Aromatics — the same ingredient would then split into two
 *  separate shopping-list rows instead of adding up. Same for garlic. */
function guessGroup(name){
  if(/chicken|beef|pork|shrimp|fish|egg|tofu|meat|lamb/i.test(name)) return 'Protein';
  if(/mint|cilantro|basil|ginger|lemongrass|herb|scallion|garlic|shallot|chive/i.test(name)) return 'Herbs & Aromatics';
  if(/onion|tomato|potato|carrot|cucumber|lettuce|lime|lemon|pepper|veg|mushroom|sprout/i.test(name)) return 'Produce';
  return 'Pantry';
}

        <input class="nk-in" data-inp="time" value="${esc(f.time)}" placeholder="40" inputmode="numeric" style="width:100%;text-align:center;">
      </div>
    </div>

    <div style="margin-top:18px;">
      <label class="label">Category</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">${cats}</div>
    </div>

    <div style="margin-top:22px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <label class="label" style="margin-bottom:0;">Ingredients</label>
        <span style="font-size:11px;color:color-mix(in srgb,var(--color-text) 45%,transparent);">amount · unit · item</span>
      </div>
      ${rows}
      <button data-act="addIng" style="margin-top:4px;display:inline-flex;align-items:center;gap:7px;background:none;border:0;font-family:var(--font-heading);font-weight:800;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--color-accent);cursor:pointer;">${ICON.plus(14)} Add ingredient</button>
    </div>

    <button class="btn-accent" data-act="save" style="margin-top:26px;width:100%;padding:16px 18px;font-size:15px;letter-spacing:.04em;display:block;text-align:left;">${editing ? 'Save changes' : 'Save to menu'}</button>

    ${editing ? `
      <button data-act="removeDish" style="margin-top:10px;width:100%;background:none;border:2px solid ${state.confirmDelete ? 'var(--color-accent)' : 'var(--color-divider)'};color:${state.confirmDelete ? 'var(--color-accent)' : 'color-mix(in srgb,var(--color-text) 55%,transparent)'};padding:14px 18px;font-family:var(--font-heading);font-weight:800;font-size:13px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;text-align:left;">
        ${state.confirmDelete ? 'Tap again to remove' : 'Remove from menu'}
      </button>
    ` : ''}
  </div>`;
}

/* ── Tab bar ────────────────────────────────────────────────────────────── */
function renderTabs(){
  const ids = Object.keys(state.cart);
  const accent = 'var(--color-accent)';
  const muted  = 'color-mix(in srgb,var(--color-text) 42%,transparent)';
  const tab = (key, icon, label, badge) => `
    <button class="tab" data-act="go" data-screen="${key}" style="color:${state.screen === key ? accent : muted};">
      <div style="position:relative;">${icon}${badge || ''}</div>
      <span>${label}</span>
    </button>`;

  const badge = ids.length > 0
    ? `<span style="position:absolute;top:-6px;right:-9px;min-width:17px;height:17px;padding:0 4px;background:var(--color-accent);color:#fff;font-family:var(--font-heading);font-weight:800;font-size:10px;display:flex;align-items:center;justify-content:center;line-height:1;">${ids.length}</span>`
    : '';

  return tab('menu', ICON.menu, 'Menu')
       + tab('order', ICON.order, 'Order', badge)
       + tab('list', ICON.list, 'List')
       + tab('add', ICON.add, 'Add');
}

function renderToast(){
  if(!state.toast) return '';
  return `<div style="position:absolute;left:20px;right:20px;bottom:104px;z-index:40;background:var(--color-text);color:var(--color-bg);padding:14px 16px;font-family:var(--font-heading);font-weight:800;font-size:13px;letter-spacing:.03em;text-transform:uppercase;animation:nkToast 2.2s ease forwards;pointer-events:none;">${esc(state.toast)}</div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   Render
   ═══════════════════════════════════════════════════════════════════════ */
const $header   = document.getElementById('header');
const $scroll   = document.getElementById('scroll');
const $tabbar   = document.getElementById('tabbar');
const $overlays = document.getElementById('overlays');
const $status   = document.getElementById('statusbar');

const SCREENS = { menu:renderMenu, order:renderOrder, list:renderList, add:renderAdd };
let lastScreen = null;

function render(){
  $header.innerHTML = renderHeader();
  $tabbar.innerHTML = renderTabs();

  // Preserve scroll position when re-rendering the same screen (qty steppers,
  // ingredient check-offs) so the list doesn't jump under the user's thumb.
  const keepScroll = lastScreen === state.screen ? $scroll.scrollTop : 0;
  $scroll.innerHTML = (SCREENS[state.screen] || renderMenu)();
  $scroll.scrollTop = keepScroll;
  lastScreen = state.screen;

  $overlays.innerHTML = renderDetail() + renderShare() + renderPair() + renderToast();
  $status.classList.toggle('on-white', state.share);
}

/* ═══════════════════════════════════════════════════════════════════════════
   Interaction
   ═══════════════════════════════════════════════════════════════════════ */
const app = document.getElementById('app');

const ACTIONS = {
  go(el){
    const target = el.dataset.screen;
    // Tapping "Add" from elsewhere always starts a fresh dish; leaving the
    // screen drops any half-finished edit.
    if(target === 'add' && state.screen !== 'add') resetForm();
    if(target !== 'add') resetForm();
    state.screen = target;
    state.detail = null;
  },
  edit(){
    const d = recipeById(state.detail);
    if(!d) return;
    state.editing = d.id;
    state.confirmDelete = false;
    state.form = {
      name: d.name,
      en: d.en === 'Your recipe' ? '' : d.en,
      cat: d.cat,
      time: String(d.time || ''),
      ingredients: d.ing.length
        ? d.ing.map(i => ({ name:i.n, qty: i.q ? String(i.q) : '', unit:i.u }))
        : [{ name:'', qty:'', unit:'' }],
    };
    state.detail = null;
    state.screen = 'add';
  },
  removeDish(){
    // Two-tap confirm — deleting a dish also drops it from the current order.
    if(!state.confirmDelete){ state.confirmDelete = true; return; }
    const id = state.editing;
    const r = recipeById(id);
    state.recipes = state.recipes.filter(x => x.id !== id);
    delete state.cart[id];
    dropPhoto('photo-' + id);
    resetForm();
    state.screen = 'menu';
    save();
    showToast((r ? r.name : 'Dish') + ' removed');
  },
  open(el){ state.detail = el.dataset.id; },
  closeDetail(){ state.detail = null; },
  backdrop(el, ev){ if(ev.target === el) state.detail = null; },
  add(el){
    const r = recipeById(el.dataset.id);
    setCart(r.id, 1);
    showToast(r.name + ' added');
  },
  inc(el){ setCart(el.dataset.id, (state.cart[el.dataset.id] || 0) + 1); },
  dec(el){ setCart(el.dataset.id, (state.cart[el.dataset.id] || 0) - 1); },
  remove(el){ setCart(el.dataset.id, 0); },
  detailAdd(){
    const d = recipeById(state.detail);
    if(!d) return;
    setCart(d.id, (state.cart[d.id] || 0) + 1);
    showToast(d.name + ' added');
  },
  toggle(el){
    const k = el.dataset.key;
    if(state.checked[k]) delete state.checked[k];
    else state.checked[k] = true;
    save();
  },
  reset(){ state.checked = {}; save(); },
  share(){
    if(Object.keys(state.cart).length === 0){ showToast('Add a dish first'); return; }
    state.share = true;
    state.shareSent = false;
  },
  send(){ state.shareSent = true; },
  closeShare(){ state.share = false; state.shareSent = false; },
  cat(el){ state.form.cat = el.dataset.cat; },
  addIng(){ state.form.ingredients.push({ name:'', qty:'', unit:'' }); },
  rmIng(el){
    const a = state.form.ingredients.filter((_, j) => j !== Number(el.dataset.i));
    state.form.ingredients = a.length ? a : [{ name:'', qty:'', unit:'' }];
  },
  save(){ saveRecipe(); },
  clearPhoto(el){ dropPhoto(el.dataset.id); },
  backup(){ exportBackup(); },
  restore(){ backuppick.value = ''; backuppick.click(); },
  pair(){ state.pairOpen = true; },
  closePair(){ state.pairOpen = false; },
  pairBackdrop(el, ev){ if(ev.target === el) state.pairOpen = false; },
  copyPair(){
    const link = location.origin + location.pathname + '#k=' + household;
    if(navigator.clipboard) navigator.clipboard.writeText(link).catch(() => {});
    showToast('Link copied');
  },
};

app.addEventListener('click', ev => {
  const slotEl = ev.target.closest('[data-slot]');
  const el = ev.target.closest('[data-act]');

  if(el){
    const fn = ACTIONS[el.dataset.act];
    if(fn){
      // showToast renders on its own; other actions render once here.
      const before = state.toast;
      fn(el, ev);
      if(state.toast === before) render();
      return;
    }
  }
  if(slotEl){ pickPhoto(slotEl.dataset.slot); }
});

// Live-bind form inputs into state without re-rendering (keeps caret + focus).
app.addEventListener('input', ev => {
  const el = ev.target;
  if(el.dataset.inp === 'name' || el.dataset.inp === 'en' || el.dataset.inp === 'time'){
    state.form[el.dataset.inp] = el.value;
  }else if(el.dataset.inp === 'ing'){
    state.form.ingredients[Number(el.dataset.i)][el.dataset.f] = el.value;
  }
});

function saveRecipe(){
  const f = state.form;
  if(!f.name.trim()){ showToast('Add a dish name'); return; }

  const ing = f.ingredients.filter(x => x.name.trim()).map(x => ({
    n: x.name.trim(),
    q: x.qty !== '' && !isNaN(parseFloat(x.qty)) ? parseFloat(x.qty) : 0,
    u: x.unit.trim(),
    g: guessGroup(x.name),
  }));

  const time = parseInt(f.time, 10);

  // Editing an existing dish updates in place, keeping its id so anything
  // already in the order — and its photo — stays attached.
  if(state.editing){
    const i = state.recipes.findIndex(r => r.id === state.editing);
    if(i === -1){ resetForm(); state.screen = 'menu'; return; }
    const prev = state.recipes[i];
    state.recipes[i] = {
      ...prev,
      name: f.name.trim(),
      en:   f.en.trim() || prev.en,
      cat:  f.cat,
      time: Number.isFinite(time) && time > 0 ? time : prev.time,
      ing,
    };
    const name = state.recipes[i].name;
    resetForm();
    state.screen = 'menu';
    save();
    showToast(name + ' updated');
    return;
  }

  const id = 'r' + Date.now();
  const recipe = {
    id,
    name: f.name.trim(),
    en:   f.en.trim() || 'Your recipe',
    cat:  f.cat,
    time: Number.isFinite(time) && time > 0 ? time : 40,
    ing,
  };
  state.recipes.push(recipe);

  // Carry the photo from the form slot over to the new dish's slot.
  if(state.photos['new-dish-photo']){
    setPhoto('photo-' + id, state.photos['new-dish-photo']);
    dropPhoto('new-dish-photo');
  }

  resetForm();
  state.screen = 'menu';
  save();
  showToast(recipe.name + ' saved to menu');
}

/* ── Photo slots: click to browse, drag an image to drop ────────────────── */
const filepick = document.getElementById('filepick');
let pendingSlot = null;

function pickPhoto(id){
  pendingSlot = id;
  filepick.value = '';
  filepick.click();
}
filepick.addEventListener('change', () => {
  if(filepick.files[0] && pendingSlot) readImage(filepick.files[0], pendingSlot);
});

app.addEventListener('dragover', ev => {
  const s = ev.target.closest('[data-slot]');
  if(!s) return;
  ev.preventDefault();
  s.classList.add('drag');
});
app.addEventListener('dragleave', ev => {
  const s = ev.target.closest('[data-slot]');
  if(s) s.classList.remove('drag');
});
app.addEventListener('drop', ev => {
  const s = ev.target.closest('[data-slot]');
  if(!s) return;
  ev.preventDefault();
  s.classList.remove('drag');
  const file = ev.dataTransfer.files[0];
  if(file && file.type.startsWith('image/')) readImage(file, s.dataset.slot);
});

/** Downscale to a sane size before storing — full-res data URLs blow the quota. */
function readImage(file, slotId){
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const MAX = 900;
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width  = Math.round(img.width  * scale);
      c.height = Math.round(img.height * scale);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      setPhoto(slotId, c.toDataURL('image/jpeg', 0.82));
      render();
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

/* ── Clock ──────────────────────────────────────────────────────────────── */
function tick(){
  const d = new Date();
  let h = d.getHours() % 12; if(h === 0) h = 12;
  document.getElementById('clock').textContent = h + ':' + String(d.getMinutes()).padStart(2,'0');
}
tick();
setInterval(tick, 20000);

/* ── Boot ───────────────────────────────────────────────────────────────── */
const backuppick = document.getElementById('backuppick');
backuppick.addEventListener('change', () => {
  if(backuppick.files[0]) importBackup(backuppick.files[0]);
});

load();
render();

// Photos load asynchronously, so paint once without them and again when ready.
photoAll()
  .then(p => { state.photos = { ...p, ...state.photos }; render(); })
  .catch(() => {});

// Ask the browser not to evict this app's data under storage pressure.
if(navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(() => {});

// Offline support. Needs https (or localhost) — silently skipped otherwise.
if('serviceWorker' in navigator){
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}

initCloud().catch(() => setSync('error'));
</script>
